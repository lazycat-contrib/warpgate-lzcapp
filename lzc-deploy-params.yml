params:
  - id: adminpassword
    type: secret
    name: "Warpgate Admin Password"
    description: "The password for Warpgate admin user"
    default_value: "$random(len=20)"

  - id: http_port
    type: string
    name: "HTTP Port"
    description: "Warpgate HTTP/HTTPS web interface port"
    default_value: "8888"

  - id: ssh_port
    type: string
    name: "SSH Port"
    description: "Warpgate SSH proxy port"
    default_value: "2222"

  - id: mysql_port
    type: string
    name: "MySQL Port"
    description: "Warpgate MySQL proxy port"
    default_value: "33306"

locales:
  zh:
    adminpassword:
      name: "Warpgate管理员密码"
