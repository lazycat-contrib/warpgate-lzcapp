application:
  subdomain: warpgate
  background_task: true
  public_path:
    - /
  upstreams:
    - location: /
      backend: https://warpgate:8888/
      disable_backend_ssl_verify: true  # Warpgate uses self-signed TLS
  ingress:
    - protocol: tcp
      port: 2222
      service: warpgate
    - protocol: tcp
      port: 33306
      service: warpgate
  injects:
    - id: login-autofill
      when:
        - /
      do:
        - src: builtin://simple-inject-password
          params:
            user: "{{ .U.login_user }}"
            password: "{{ .U.adminpassword }}"

services:
  warpgate:
    # ghcr.io/warp-tech/warpgate:0.24.1
    image: registry.lazycat.cloud/czyt/warp-tech/warpgate:936db9d9dffbc5ac
    binds:
      - /lzcapp/var/data:/data
    environment:
      - WARPGATE_ADMIN_PASSWORD={{ .U.adminpassword }}
    setup_script: |
      if [ -f /lzcapp/var/data/warpgate.yaml ]; then
        echo "warpgate.yaml already exists"
      else
        echo "warpgate.yaml does not exist, creating it"
        /usr/local/bin/warpgate unattended-setup --data-path /data --http-port 8888 --ssh-port 2222 --mysql-port 33306  && cp /etc/warpgate.yaml /data/warpgate.yaml
      fi
      # Enable trust_x_forwarded_headers for reverse proxy support (SSO, correct redirect URLs)
      if grep -q 'trust_x_forwarded_headers' /lzcapp/var/data/warpgate.yaml; then
        sed -i 's/trust_x_forwarded_headers:.*/trust_x_forwarded_headers: true/' /lzcapp/var/data/warpgate.yaml
      else
        sed -i '/^http:/a\  trust_x_forwarded_headers: true' /lzcapp/var/data/warpgate.yaml
      fi

usage: |
  Warpgate 堡垒机使用说明：
  1. HTTP 管理界面：通过端口 8888 访问 Web 管理界面
  2. SSH 代理：通过端口 2222 连接 SSH 代理
  3. MySQL 代理：通过端口 33306 连接 MySQL 代理
  4. 默认管理员用户名为 admin，密码为部署时设置的管理员密码
